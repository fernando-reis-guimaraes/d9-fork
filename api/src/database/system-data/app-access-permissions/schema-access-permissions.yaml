# NOTE: Activity/collections/fields/presets/relations/revisions will have an extra hardcoded filter
# to filter out collections you don't have read access

- collection: sigedin_collections
  action: read

- collection: sigedin_fields
  action: read

- collection: sigedin_permissions
  action: read
  permissions:
    role:
      _eq: $CURRENT_ROLE

- collection: sigedin_relations
  action: read
