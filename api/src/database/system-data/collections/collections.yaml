table: sigedin_collections

defaults:
  collection: null
  hidden: false
  singleton: false
  icon: null
  note: null
  translations: null
  display_template: null
  accountability: 'all'

data:
  - collection: sigedin_activity
    note: $t:sigedin_collection.sigedin_activity
    accountability: null
  - collection: sigedin_collections
    icon: list_alt
    note: $t:sigedin_collection.sigedin_collections
  - collection: sigedin_fields
    icon: input
    note: $t:sigedin_collection.sigedin_fields
  - collection: sigedin_files
    icon: folder
    note: $t:sigedin_collection.sigedin_files
    display_template: '{{ $thumbnail }} {{ title }}'
  - collection: sigedin_folders
    note: $t:sigedin_collection.sigedin_folders
    display_template: '{{ name }}'
  - collection: sigedin_migrations
    note: $t:sigedin_collection.sigedin_migrations
  - collection: sigedin_permissions
    icon: admin_panel_settings
    note: $t:sigedin_collection.sigedin_permissions
  - collection: sigedin_presets
    icon: bookmark
    note: $t:sigedin_collection.sigedin_presets
    accountability: null
  - collection: sigedin_relations
    icon: merge_type
    note: $t:sigedin_collection.sigedin_relations
  - collection: sigedin_revisions
    note: $t:sigedin_collection.sigedin_revisions
    accountability: null
  - collection: sigedin_roles
    icon: supervised_user_circle
    note: $t:sigedin_collection.sigedin_roles
  - collection: sigedin_sessions
    note: $t:sigedin_collection.sigedin_sessions
  - collection: sigedin_settings
    singleton: true
    note: $t:sigedin_collection.sigedin_settings
  - collection: sigedin_users
    archive_field: status
    archive_value: archived
    unarchive_value: draft
    icon: people_alt
    note: $t:sigedin_collection.sigedin_users
    display_template: '{{ first_name }} {{ last_name }}'
  - collection: sigedin_webhooks
    note: $t:sigedin_collection.sigedin_webhooks
  - collection: sigedin_dashboards
    note: $t:sigedin_collection.sigedin_dashboards
  - collection: sigedin_panels
    note: $t:sigedin_collection.sigedin_panels
  - collection: sigedin_notifications
    note: $t:sigedin_collection.sigedin_notifications
  - collection: sigedin_shares
    icon: share
    note: $t:sigedin_collection.sigedin_shares
  - collection: sigedin_flows
    note: $t:sigedin_collection.sigedin_flows
  - collection: sigedin_operations
    note: $t:sigedin_collection.sigedin_operations
